<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width" />
  <title>像素语音识别 - Pixel Speech Recognition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* CSS 变量定义 */
    :root {
      --primary-dark: #0f2740;
      --primary-light: #eaf6ff;
      --primary-gray: #8ec9f2;
      --primary-hover: #6fb8ea;
      --accent-dark: #1b3e5d;
      --accent-light: #cfeaff;
      --border-color: #a9d8f7;
      --text-muted: #b9d7ec;
      --text-disabled: #7f9fb6;
      --panel-bg: rgba(20, 40, 60, 0.38);
      --shadow-color: rgba(8, 24, 38, 0.75);
      --pixel-font: 'Press Start 2P', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--pixel-font);
      background-color: var(--primary-dark);
      color: var(--primary-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
      padding: 20px;
      position: relative;
      isolation: isolate;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      pointer-events: none;
    }

    .app-shell {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    h1 {
      font-family: var(--pixel-font);
      font-size: 24px;
      color: var(--primary-light);
      text-shadow: 
        3px 3px 0px var(--shadow-color),
        0 0 14px rgba(169, 216, 247, 0.4);
      margin-bottom: 30px;
      letter-spacing: 2px;
      animation: pixelGlow 1.5s infinite alternate;
    }

    @keyframes pixelGlow {
      0% {
        text-shadow: 
          3px 3px 0px var(--shadow-color),
          0 0 8px rgba(169, 216, 247, 0.28);
      }
      100% {
        text-shadow: 
          3px 3px 0px var(--shadow-color),
          0 0 14px rgba(169, 216, 247, 0.5);
      }
    }

    #status {
      font-family: var(--pixel-font);
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 20px;
      min-height: 20px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0px var(--shadow-color);
    }

    .loading {
      display: none !important;
    }

    .tab-content {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .controls-container {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      font-family: var(--pixel-font);
      font-size: 14px;
      background-color: var(--primary-gray);
      color: #0d2236;
      border: 2px solid var(--border-color);
      padding: 12px 20px;
      cursor: pointer;
      text-shadow: 1px 1px 0px rgba(234, 246, 255, 0.25);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover:not(:disabled) {
      background-color: var(--primary-hover);
      color: var(--primary-light);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--shadow-color);
    }

    button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--shadow-color);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: var(--accent-dark);
      color: var(--text-disabled);
    }

    #startBtn {
      background-color: var(--primary-gray);
    }

    #stopBtn {
      background-color: #5da6d6;
    }

    #clearBtn {
      background-color: #7bbfe8;
    }

    .transcript-label {
      font-family: var(--pixel-font);
      font-size: 12px;
      color: var(--primary-light);
      text-shadow: 1px 1px 0px var(--shadow-color);
      letter-spacing: 1px;
      padding: 10px;
      border: 2px solid var(--border-color);
      background-color: var(--panel-bg);
    }

    textarea {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background-color: var(--panel-bg);
      color: var(--primary-light);
      border: 2px solid var(--border-color);
      padding: 12px;
      resize: none;
      width: 100%;
      min-height: 250px;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    textarea::-webkit-scrollbar {
      width: 12px;
    }

    textarea::-webkit-scrollbar-track {
      background: var(--panel-bg);
      border: 2px solid var(--border-color);
    }

    textarea::-webkit-scrollbar-thumb {
      background: var(--primary-hover);
      border: 2px solid var(--border-color);
    }

    textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    #VoiceBtn {
      font-family: var(--pixel-font);
      font-size: 16px;
      width: 160px;
      height: 160px;
      border: 4px solid var(--border-color);
      background-color: var(--primary-hover);
      color: #0d2236;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-shadow: 1px 1px 0px rgba(234, 246, 255, 0.35);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 30px;
      line-height: 1.4;
      padding: 16px;
      box-shadow: 8px 8px 0px var(--shadow-color);
    }

    #VoiceBtn:hover {
      background-color: var(--accent-light);
      color: #10283f;
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px var(--shadow-color);
    }

    #VoiceBtn:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0px var(--shadow-color);
      background-color: var(--accent-dark);
      color: var(--primary-light);
    }

    #VoiceBtn.recording {
      animation: pixelPulse 0.5s infinite;
      background-color: #9dd6fa;
      box-shadow: inset 0px 0px 20px rgba(16, 40, 63, 0.45), 8px 8px 0px var(--shadow-color);
    }

    @keyframes pixelPulse {
      0%, 100% {
        background-color: #9dd6fa;
      }
      50% {
        background-color: var(--primary-hover);
      }
    }

    #sound-clips {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 800px;
      margin-top: 20px;
    }

    .clip {
      background-color: var(--panel-bg);
      border: 2px solid var(--border-color);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.2s;
    }

    .clip:hover {
      background-color: rgba(39, 84, 119, 0.62);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--shadow-color);
    }

    .clip audio {
      width: 100%;
      height: 30px;
      border: 1px solid var(--border-color);
    }

    .clip p {
      font-family: var(--pixel-font);
      font-size: 11px;
      color: var(--primary-light);
      cursor: pointer;
      text-shadow: 1px 1px 0px var(--shadow-color);
      word-break: break-all;
      letter-spacing: 0.5px;
    }

    .clip p:hover {
      color: var(--accent-light);
      text-decoration: underline;
    }

    .delete {
      font-family: var(--pixel-font);
      font-size: 11px;
      background-color: var(--accent-light);
      color: #10283f;
      border: 2px solid var(--border-color);
      padding: 6px 10px;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .delete:hover {
      background-color: var(--primary-hover);
      color: var(--primary-light);
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0px var(--shadow-color);
    }

    .delete:active {
      transform: translate(1px, 1px);
      box-shadow: 0px 0px 0px var(--shadow-color);
    }

    /* 响应式设计 */
    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
        margin-bottom: 20px;
      }

      button {
        font-size: 12px;
        padding: 10px 16px;
      }

      #VoiceBtn {
        width: 140px;
        height: 140px;
        font-size: 14px;
      }

      textarea {
        min-height: 200px;
        font-size: 11px;
      }

      .controls-container {
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="3月19日.mp4" type="video/mp4">
  </video>

  <div class="app-shell">
  <h1>
    PIXEL ASR
  </h1>

  <div id="status">Loading...</div>

  <div id="singleAudioContent" class="tab-content loading">
    <div class="controls-container">
      <button id="startBtn" disabled>Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div style="text-align: center;">
      <div class="transcript-label">TRANSCRIPT</div>
      <textarea id="results" placeholder="Output will appear here..." readonly></textarea>
    </div>
  </div>

  <div id="VoiceBtn">
    PRESS<br>TO<br>TALK
  </div>

  <section id="sound-clips"></section>
  </div>

  <script src="sherpa-onnx-asr.js"></script>
  <script src="app-asr.js"></script>
  <script src="sherpa-onnx-wasm-main-asr.js"></script>
</body>

</html>
