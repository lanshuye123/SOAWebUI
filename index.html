<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width" />
  <title>像素语音识别 - Pixel Speech Recognition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="assets/background.mp4" type="video/mp4">
  </video>

  <div class="app-shell">
    <h1>
      PIXEL ASR
    </h1>

    <div id="status">Loading...</div>

    <div id="singleAudioContent" class="tab-content loading" style="text-align: center;">
      <div class="controls-container">
        <button id="startBtn" disabled>Start</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div id="container" style="text-align: center;">
        <!-- 左侧面板：原始转录模块 -->
        <div class="panel">
          <div class="transcript-label">TRANSCRIPT</div>
          <textarea id="results" placeholder="Output will appear here..." readonly></textarea>
        </div>
        <!-- 右侧面板：新增的已处理模块（LLM结果） -->
        <div class="panel">
          <div class="transcript-label">PROCESSED</div>
          <textarea id="llm_result" placeholder="LLM Output will appear here..." readonly></textarea>
        </div>
      </div>

      <div id="VoiceBtn">
        PRESS<br>TO<br>TALK
      </div>

      <section id="sound-clips"></section>
    </div>

    <script src="so-asr.js"></script>
    <script src="ai.js"></script>
    <script src="app.js"></script>
    <script src="sherpa-onnx-wasm-main-asr.js"></script>
</body>

</html>
