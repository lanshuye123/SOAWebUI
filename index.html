<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width" />
  <title>像素语音识别 - Pixel Speech Recognition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* CSS 变量定义 */
    :root {
      --primary-dark: #1a1a1a;
      --primary-light: #ffffff;
      --primary-gray: #808080;
      --accent-dark: #2d2d2d;
      --accent-light: #e0e0e0;
      --border-color: #000;
      --pixel-font: 'Press Start 2P', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--pixel-font);
      background-color: var(--primary-dark);
      color: var(--primary-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23333333" width="100" height="100"/><rect fill="%23666666" x="20" y="20" width="10" height="10"/><rect fill="%23888888" x="40" y="30" width="15" height="15"/><rect fill="%23444444" x="60" y="40" width="12" height="12"/></svg>');
      background-attachment: fixed;
      padding: 20px;
    }

    h1 {
      font-family: var(--pixel-font);
      font-size: 24px;
      color: var(--primary-light);
      text-shadow: 
        3px 3px 0px var(--border-color),
        6px 6px 0px rgba(255, 255, 255, 0.3);
      margin-bottom: 30px;
      letter-spacing: 2px;
      animation: pixelGlow 1.5s infinite alternate;
    }

    @keyframes pixelGlow {
      0% {
        text-shadow: 
          3px 3px 0px var(--border-color),
          6px 6px 0px rgba(255, 255, 255, 0.3);
      }
      100% {
        text-shadow: 
          3px 3px 0px var(--border-color),
          6px 6px 0px rgba(255, 255, 255, 0.6);
      }
    }

    #status {
      font-family: var(--pixel-font);
      font-size: 12px;
      color: var(--accent-light);
      text-align: center;
      margin-bottom: 20px;
      min-height: 20px;
      letter-spacing: 1px;
    }

    .loading {
      display: none !important;
    }

    .tab-content {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .controls-container {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      font-family: var(--pixel-font);
      font-size: 14px;
      background-color: var(--primary-gray);
      color: var(--primary-light);
      border: 2px solid var(--border-color);
      padding: 12px 20px;
      cursor: pointer;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover:not(:disabled) {
      background-color: var(--accent-light);
      color: var(--border-color);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--border-color);
    }

    button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: var(--accent-dark);
    }

    #startBtn {
      background-color: var(--primary-gray);
    }

    #stopBtn {
      background-color: #4a4a4a;
    }

    #clearBtn {
      background-color: var(--primary-gray);
    }

    .transcript-label {
      font-family: var(--pixel-font);
      font-size: 12px;
      color: var(--primary-light);
      text-shadow: 2px 2px 0px var(--border-color);
      letter-spacing: 1px;
      padding: 10px;
      border: 2px solid var(--border-color);
      background-color: var(--accent-dark);
    }

    textarea {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background-color: var(--accent-dark);
      color: var(--accent-light);
      border: 2px solid var(--border-color);
      padding: 12px;
      resize: none;
      width: 100%;
      min-height: 250px;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    textarea::-webkit-scrollbar {
      width: 12px;
    }

    textarea::-webkit-scrollbar-track {
      background: var(--accent-dark);
      border: 2px solid var(--border-color);
    }

    textarea::-webkit-scrollbar-thumb {
      background: var(--primary-gray);
      border: 2px solid var(--border-color);
    }

    textarea::placeholder {
      color: var(--primary-gray);
      opacity: 0.7;
    }

    #VoiceBtn {
      font-family: var(--pixel-font);
      font-size: 16px;
      width: 160px;
      height: 160px;
      border: 4px solid var(--border-color);
      background-color: var(--primary-gray);
      color: var(--primary-light);
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-shadow: 3px 3px 0px var(--border-color);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 30px;
      line-height: 1.4;
      padding: 16px;
      box-shadow: 8px 8px 0px var(--border-color);
    }

    #VoiceBtn:hover {
      background-color: var(--accent-light);
      color: var(--border-color);
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px var(--border-color);
    }

    #VoiceBtn:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0px var(--border-color);
      background-color: var(--accent-dark);
      color: var(--primary-light);
    }

    #VoiceBtn.recording {
      animation: pixelPulse 0.5s infinite;
      background-color: #5a5a5a;
      box-shadow: inset 0px 0px 20px rgba(0, 0, 0, 0.5), 8px 8px 0px var(--border-color);
    }

    @keyframes pixelPulse {
      0%, 100% {
        background-color: #5a5a5a;
      }
      50% {
        background-color: var(--primary-gray);
      }
    }

    #sound-clips {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 800px;
      margin-top: 20px;
    }

    .clip {
      background-color: var(--accent-dark);
      border: 2px solid var(--border-color);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.2s;
    }

    .clip:hover {
      background-color: var(--primary-gray);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--border-color);
    }

    .clip audio {
      width: 100%;
      height: 30px;
      border: 1px solid var(--border-color);
    }

    .clip p {
      font-family: var(--pixel-font);
      font-size: 11px;
      color: var(--primary-light);
      cursor: pointer;
      text-shadow: 1px 1px 0px var(--border-color);
      word-break: break-all;
      letter-spacing: 0.5px;
    }

    .clip p:hover {
      color: var(--accent-light);
      text-decoration: underline;
    }

    .delete {
      font-family: var(--pixel-font);
      font-size: 11px;
      background-color: var(--accent-light);
      color: var(--border-color);
      border: 2px solid var(--border-color);
      padding: 6px 10px;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .delete:hover {
      background-color: var(--primary-light);
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0px var(--border-color);
    }

    .delete:active {
      transform: translate(1px, 1px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    /* 响应式设计 */
    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
        margin-bottom: 20px;
      }

      button {
        font-size: 12px;
        padding: 10px 16px;
      }

      #VoiceBtn {
        width: 140px;
        height: 140px;
        font-size: 14px;
      }

      textarea {
        min-height: 200px;
        font-size: 11px;
      }

      .controls-container {
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <h1>
    PIXEL ASR
  </h1>

  <div id="status">Loading...</div>

  <div id="singleAudioContent" class="tab-content loading">
    <div class="controls-container">
      <button id="startBtn" disabled>Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div style="text-align: center;">
      <div class="transcript-label">TRANSCRIPT</div>
      <textarea id="results" placeholder="Output will appear here..." readonly></textarea>
    </div>
  </div>

  <div id="VoiceBtn">
    PRESS<br>TO<br>TALK
  </div>

  <section id="sound-clips"></section>

  <script src="sherpa-onnx-asr.js"></script>
  <script src="app-asr.js"></script>
  <script src="sherpa-onnx-wasm-main-asr.js"></script>
</body>

</html>
